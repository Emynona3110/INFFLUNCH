<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="src/assets/bg-infflux.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Hors des résultats de recherche (site interne). N.B. : ne restreint PAS
         l'accès — la vraie protection reste l'authentification + RLS. -->
    <meta name="robots" content="noindex, nofollow" />
    <!-- Design system fonts (Aurora UI : Plus Jakarta Sans + Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>INFFLUNCH</title>
    <!-- Anti-FOUC : applique le thème stocké avant le rendu -->
    <script>
      try {
        if (localStorage.getItem("theme") === "dark")
          document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
